services:
  backend:
    image: ghcr.io/juro-candf/zadania-wdrozeniowe-backend:latest
    ports:
      - "8000:8000"
  frontend:
    image: ghcr.io/juro-candf/zadania-wdrozeniowe-frontend:latest
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000
    depends_on:
      - backend